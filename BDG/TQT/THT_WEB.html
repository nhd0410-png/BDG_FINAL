<div class="video-container" style="padding: 20px; text-align: center;">
    <h3 style="color: var(--dark-red); margin-bottom: 20px; font-weight: 700; font-size: 1.4rem;">Video Giới Thiệu</h3>

    <a href="https://youtu.be/75dEJdVc1A4" target="_blank" style="text-decoration: none; display: block; position: relative; max-width: 650px; margin: 0 auto;">
        <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius: 20px; box-shadow: 0 12px 35px rgba(0,0,0,0.25); background: url('https://img.youtube.com/vi/75dEJdVc1A4/maxresdefault.jpg') no-repeat center center; background-size: cover; transform: translate3d(0,0,0);">
            
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.25); transition: 0.3s;"></div>
            
            <div class="play-button" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 55px; background: rgba(255,0,0,0.9); border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s;">
                <div style="width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid white; margin-left: 5px;"></div>
            </div>

            <style>
                /* Hiệu ứng di chuột */
                a:hover .play-button { 
                    background: #ff0000 !important; 
                    transform: translate(-50%, -50%) scale(1.1); 
                    box-shadow: 0 0 30px rgba(255,0,0,0.5); 
                }
            </style>
        </div>
        <p style="margin-top: 15px; color: var(--dark-red); font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">
            🎬 Xem video trên YouTube →
        </p>
    </a>
</div>
